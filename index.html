<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EXALTIS | The Sovereign Archive</title>
    <style>
        :root {
            --jaguar-black: #030303;
            --blood-red: #3a0202;
            --sacred-gold: #8e7d5a;
            --parchment: #E6E2D3;
            --deep-indigo: #2E3192;
            --ink: #1a1a1a;
            --page-joy: var(--parchment); 
            --page-calm: #f0eee4; 
            --page-rage: #dcd7c5; 
            --page-void: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--jaguar-black); color: var(--parchment); font-family: 'Garamond', serif; overflow: hidden; height: 100dvh; width: 100vw; position: fixed; }

        /* --- STAGE 1: SOUL AUDIT --- */
        #audit-view { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; transition: 0.8s; padding: 20px; }
        .audit-container { width: 100%; max-width: 450px; text-align: center; }
        
        .vampire-letter {
            font-size: 0.9rem; line-height: 1.8; color: var(--parchment); opacity: 0.8;
            margin-bottom: 40px; padding: 30px; border-left: 2px solid var(--deep-indigo);
            text-align: left; font-style: italic; background: rgba(46, 49, 146, 0.05);
        }

        .handle-wrapper {
            display: flex; justify-content: center; align-items: center; 
            margin-bottom: 30px; border-bottom: 1px solid #222; width: 100%; max-width: 300px; margin-left: auto; margin-right: auto;
        }
        .handle-input {
            background: transparent; border: none; color: var(--parchment); 
            padding: 15px 0; font-family: inherit; font-size: 1.1rem;
            letter-spacing: 4px; outline: none; width: 100%; text-transform: uppercase;
        }

        .audit-input { 
            width: 100%; background: #050505; border: 1px solid #111; 
            color: #fff; padding: 25px; font-family: inherit; font-size: 1rem; 
            resize: none; outline: none; margin-bottom: 40px; height: 150px;
        }

        .sigil-entrance { cursor: not-allowed; display: flex; flex-direction: column; align-items: center; opacity: 0.05; transition: 1.2s; }
        .sigil-entrance.unlocked { cursor: pointer; opacity: 1; }
        .sigil-icon { width: 50px; height: 50px; border: 1px solid var(--deep-indigo); transform: rotate(45deg); transition: 1.5s; }
        .sigil-entrance.unlocked:hover .sigil-icon { transform: rotate(405deg); box-shadow: 0 0 20px var(--deep-indigo); }
        .sigil-label { margin-top: 20px; font-size: 0.7rem; letter-spacing: 6px; color: var(--deep-indigo); text-transform: uppercase; }

        /* --- STAGE 2: LIBRARY --- */
        #library-view { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; opacity: 0; transition: 1s; padding: 20px; }
        .shelf { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; }
        .book {
            width: 110px; height: 170px; border: 1px solid rgba(230, 226, 211, 0.1);
            cursor: pointer; transition: 0.6s; border-radius: 2px 5px 5px 2px;
            display: flex; flex-direction: column; justify-content: flex-end; padding: 20px;
            box-shadow: 15px 15px 40px rgba(0,0,0,0.8);
        }
        .book.void { 
            width: 95px; height: 145px; background: #000; border: 1px solid #333; 
            box-shadow: 0 0 30px rgba(46, 49, 146, 0.2); 
        }

        /* --- CLOUD TRANSITION EFFECT --- */
        #cloud-overlay {
            position: fixed; inset: 0; pointer-events: none; z-index: 99;
            background: radial-gradient(circle, transparent 20%, black 70%);
            mask-image: radial-gradient(circle, transparent 10%, black 50%);
            -webkit-mask-image: radial-gradient(circle, transparent 10%, black 50%);
            opacity: 0; transition: 1.5s ease-in-out;
        }
        #cloud-overlay.active { opacity: 1; transform: scale(2); }

        /* --- STAGE 3: DIARY --- */
        #journal-view { display: none; position: fixed; inset: 0; background: var(--jaguar-black); justify-content: center; align-items: center; z-index: 100; opacity: 0; transition: 0.7s; padding: 15px; }
        .diary-page { 
            width: 100%; max-width: 450px; height: 85dvh; padding: 45px; position: relative; 
            transform: translateY(50px); transition: 0.8s;
            clip-path: polygon(0% 2%, 2% 0%, 98% 0%, 100% 2%, 100% 98%, 98% 100%, 2% 100%, 0% 98%);
        }
        #journal-view.active .diary-page { transform: translateY(0); }
        .diary-input { 
            width: 100%; height: 80%; background: transparent; border: none; outline: none; 
            color: var(--ink); font-family: inherit; font-size: 1.2rem; resize: none; line-height: 2;
        }

        .void-active .diary-page { background: #000 !important; clip-path: none; border: 1px solid #111; }
        .void-active .diary-input { color: var(--parchment); text-shadow: 0 0 10px rgba(46, 49, 146, 0.5); }
        .void-active .page-nav-container, .void-active #star-btn { display: none !important; }

        /* --- POPUPS --- */
        #exaltis-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #080808; border: 1px solid var(--deep-indigo); padding: 40px; z-index: 10000; text-align: center; width: 90%; max-width: 400px; opacity: 0; transition: 0.4s; }
        #exit-prompt { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--deep-indigo); font-size: 0.9rem; letter-spacing: 12px; opacity: 0; transition: 1.2s; z-index: 10001; text-align: center; width: 100%; pointer-events: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="cloud-overlay"></div>
    <div id="exit-prompt">"THE VOID CONSUMES ALL"</div>

    <div id="exaltis-popup">
        <p id="popup-text" style="font-size: 1rem; line-height: 1.8; color: var(--parchment); font-style: italic;"></p>
        <div style="display:flex; justify-content:center; gap:30px; margin-top:40px;">
            <button onclick="handlePopupAction(true)" style="background:var(--deep-indigo); border:none; color:white; padding:15px 35px; cursor:pointer; font-size: 0.8rem; letter-spacing: 3px; font-weight: bold;">PROCEED</button>
            <button id="popup-btn-no" onclick="handlePopupAction(false)" style="background:transparent; border:1px solid #333; color:var(--parchment); padding:15px 35px; cursor:pointer; font-size: 0.8rem; letter-spacing: 3px;">RETREAT</button>
        </div>
    </div>

    <div id="audit-view">
        <div class="audit-container">
            <h2 style="letter-spacing: 15px; margin-bottom: 30px; font-size: 0.75rem; color: var(--deep-indigo);">THE SOUL AUDIT</h2>
            <div class="vampire-letter">"Leave your pretenses at the gates. Enter only if you seek the truth."</div>
            <div class="handle-wrapper">
                <input type="text" class="handle-input" id="insta-id" placeholder="IDENTIFIER" autocomplete="off" oninput="validateHandle()">
            </div>
            <textarea class="audit-input" id="shadow-text" placeholder="Unspoken truth..."></textarea>
            <div class="sigil-entrance" id="sigil-gate" onclick="attemptEntrance()">
                <div class="sigil-icon"></div>
                <div class="sigil-label">Seal & Ascend</div>
            </div>
        </div>
    </div>

    <div id="library-view">
        <div class="shelf">
            <div class="book joy" onclick="openDiary('joy')"><span>JOY</span></div>
            <div class="book calm" onclick="openDiary('calm')"><span>CALM</span></div>
            <div class="book rage" onclick="openDiary('rage')"><span>RAGE</span></div>
        </div>
        <div class="book void" onclick="triggerVoid()"><span>VOID</span></div>
        <p class="return-link" onclick="resetAndReturn()" style="margin-top: 50px; cursor:pointer; opacity: 0.3;">[ BACK ]</p>
    </div>

    <div id="journal-view">
        <div class="diary-page" id="active-page">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <span id="archive-label" style="font-size: 0.7rem; opacity: 0.5; letter-spacing: 5px;">THE ARCHIVE</span>
                <span style="cursor:pointer; font-size: 1.5rem; color: var(--deep-indigo);" id="star-btn">✧</span>
            </div>
            <textarea class="diary-input" id="text-input" placeholder="..." oninput="handleTyping()"></textarea>
            <div style="position: absolute; top: 25px; right: 45px; font-size: 0.6rem; cursor: pointer; letter-spacing: 4px; font-weight: bold; color: var(--deep-indigo);" onclick="confirmSeal()">[ SEAL ]</div>
        </div>
    </div>

    <script>
        let currentMood = '';
        let bookData = { joy: [""], calm: [""], rage: [""], void: [""] };
        let typingTimer;

        // Instagram Breakout (Restored & Hidden)
        window.addEventListener('load', () => {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            if (ua.includes('Instagram') && ua.includes("Android")) {
                window.location.href = `intent://${window.location.href.replace(/https?:\/\//, "")}#Intent;scheme=https;package=com.android.chrome;end`;
            }
        });

        function validateHandle() {
            const h = document.getElementById('insta-id').value.trim();
            document.getElementById('sigil-gate').style.opacity = h.length >= 3 ? "1" : "0.05";
            document.getElementById('sigil-gate').style.cursor = h.length >= 3 ? "pointer" : "not-allowed";
        }

        function attemptEntrance() {
            if(document.getElementById('insta-id').value.length < 3) return;
            showPopup("Meditate upon your intent. The Archive is now watching.", 'enterLibrary');
        }

        function triggerVoid() {
            document.getElementById('cloud-overlay').classList.add('active');
            setTimeout(() => {
                showPopup("The Void keeps no history and grants no mercy. Once sealed, your words vanish. Enter?", 'enterVoid');
            }, 800);
        }

        function openDiary(mood) {
            currentMood = mood;
            const jView = document.getElementById('journal-view');
            const archiveLabel = document.getElementById('archive-label');
            
            document.getElementById('cloud-overlay').classList.remove('active');
            
            if(mood === 'void') {
                jView.classList.add('void-active');
                archiveLabel.innerText = "THE VOID";
            } else {
                jView.classList.remove('void-active');
                archiveLabel.innerText = "THE ARCHIVE";
            }

            document.getElementById('text-input').value = bookData[mood][0];
            document.getElementById('active-page').style.backgroundColor = `var(--page-${mood})`;
            
            switchView('library-view', 'journal-view');
            setTimeout(() => { jView.classList.add('active'); }, 100);
        }

        function handleTyping() {
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                bookData[currentMood][0] = document.getElementById('text-input').value;
            }, 60);
        }

        function confirmSeal() {
            if (currentMood === 'void') {
                showPopup("Are you certain? The Void will consume these thoughts forever.", 'finalSeal');
            } else {
                initiateSeal();
            }
        }

        function initiateSeal() { 
            const exitP = document.getElementById('exit-prompt');
            exitP.style.opacity = "1";
            document.getElementById('journal-view').classList.remove('active');
            setTimeout(() => {
                exitP.style.opacity = "0";
                if(currentMood === 'void') bookData.void = [""]; 
                switchView('journal-view', 'library-view');
            }, 2000);
        }

        function switchView(from, to) {
            const f = document.getElementById(from); const t = document.getElementById(to);
            f.style.opacity = '0';
            setTimeout(() => { f.style.display = 'none'; t.style.display = 'flex'; void t.offsetWidth; t.style.opacity = '1'; }, 600);
        }

        function showPopup(text, action) {
            document.getElementById('popup-text').innerText = text;
            window.pendingAction = action;
            const p = document.getElementById('exaltis-popup');
            p.style.display = 'block'; setTimeout(() => p.style.opacity = "1", 50);
        }

        function handlePopupAction(confirmed) {
            const p = document.getElementById('exaltis-popup');
            p.style.opacity = "0";
            setTimeout(() => {
                p.style.display = 'none';
                if(confirmed) {
                    if(window.pendingAction === 'enterLibrary') switchView('audit-view', 'library-view');
                    if(window.pendingAction === 'enterVoid') openDiary('void');
                    if(window.pendingAction === 'finalSeal') initiateSeal();
                } else {
                    document.getElementById('cloud-overlay').classList.remove('active');
                }
            }, 300);
        }

        function resetAndReturn() {
            switchView('library-view', 'audit-view');
        }
    </script>
</body>
</html>
