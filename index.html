<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EXALTIS | The Sovereign Archive</title>
    <style>
        :root {
            --jaguar-black: #030303;
            --blood-red: #3a0202;
            --sacred-gold: #8e7d5a;
            --parchment: #c2b9a3;
            --ink: #a0a0a0;
            --page-joy: #161512; --page-calm: #121316; --page-rage: #161212; --page-void: #080808;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--jaguar-black); color: var(--ink); font-family: 'Garamond', serif; overflow: hidden; height: 100dvh; width: 100vw; position: fixed; }

        /* --- STAGE 1: SOUL AUDIT --- */
        #audit-view { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; transition: 0.6s cubic-bezier(0.2, 0, 0.2, 1); padding: 20px; }
        .audit-container { width: 100%; max-width: 450px; text-align: center; }
        
        .vampire-letter {
            font-size: 0.85rem; line-height: 1.6; color: var(--parchment); opacity: 0.6;
            margin-bottom: 30px; padding: 20px; border-left: 1px solid #1a1a1a;
            text-align: left; font-style: italic; background: rgba(10,10,10,0.5);
        }

        .handle-wrapper {
            display: flex; justify-content: center; align-items: center; 
            margin-bottom: 25px; border-bottom: 1px solid #1a1a1a; width: 100%; max-width: 280px; margin-left: auto; margin-right: auto;
            transition: 0.4s; opacity: 0.4;
        }
        .handle-wrapper:focus-within { opacity: 1; border-color: var(--sacred-gold); }
        .at-symbol { color: var(--sacred-gold); font-size: 0.9rem; padding-right: 5px; }
        .handle-input {
            background: transparent; border: none; color: var(--sacred-gold); 
            padding: 12px 0; font-family: inherit; font-size: 1rem; /* Prevents auto-zoom on mobile */
            letter-spacing: 3px; outline: none; width: 100%;
        }

        .audit-input { 
            width: 100%; background: rgba(5,5,5,0.8); border: 1px solid #111; 
            color: #fff; padding: 20px; font-family: inherit; font-size: 1rem; 
            resize: none; outline: none; margin-bottom: 30px; height: 120px;
        }

        .sigil-entrance { 
            cursor: not-allowed; display: flex; flex-direction: column; align-items: center; 
            opacity: 0.1; transition: 1s ease; filter: grayscale(1);
        }
        .sigil-entrance.unlocked { cursor: pointer; opacity: 1; filter: grayscale(0); }
        .sigil-icon { width: 40px; height: 40px; border: 1px solid #1a1a1a; transform: rotate(45deg); transition: 1.5s; }
        .sigil-entrance.unlocked:hover .sigil-icon { border-color: var(--blood-red); transform: rotate(225deg); }
        .sigil-label { margin-top: 15px; font-size: 0.6rem; letter-spacing: 5px; color: var(--sacred-gold); text-transform: uppercase; }

        /* --- STAGE 2: LIBRARY --- */
        #library-view { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; opacity: 0; transition: 0.5s; transform: scale(1.05); padding: 20px; }
        .shelf { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-bottom: 40px; }
        .book {
            width: 100px; height: 150px; border: 1px solid rgba(255,255,255,0.02);
            cursor: pointer; transition: 0.5s; border-radius: 1px 4px 4px 1px;
            display: flex; flex-direction: column; justify-content: flex-end; padding: 15px;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
        }
        .book.joy { background: #2e2a1d; } .book.calm { background: #1d212e; } .book.rage { background: #2e1d1d; }
        .book.void { width: 85px; height: 125px; background: #1a1a1a; }
        
        .return-link {
            margin-top: 50px; font-size: 0.6rem; letter-spacing: 8px; font-weight: 900; 
            color: var(--sacred-gold); opacity: 0.3; cursor: pointer; transition: 0.4s; 
            text-transform: uppercase; text-align: center; padding: 10px;
        }
        .return-link:hover { opacity: 0.8; }
        .fav-section-link { margin-top: 30px; cursor: pointer; letter-spacing: 5px; font-size: 0.6rem; color: var(--sacred-gold); opacity: 0.4; text-align: center; }

        /* --- STAGE 3: DIARY --- */
        #journal-view { display: none; position: fixed; inset: 0; background: var(--jaguar-black); justify-content: center; align-items: center; z-index: 100; opacity: 0; transition: 0.5s; padding: 15px; }
        .diary-page { 
            width: 100%; max-width: 400px; height: 80dvh; padding: 35px; position: relative; 
            transform: scale(0.9) translateY(40px); transition: 0.6s cubic-bezier(0.2, 0, 0.2, 1);
            clip-path: polygon(1% 0%, 99% 0%, 100% 1%, 99% 3%, 100% 5%, 99% 95%, 100% 97%, 99% 99%, 1% 100%, 0% 98%, 1% 96%, 0% 94%, 1% 6%, 0% 4%, 1% 2%);
            overflow: hidden;
        }
        #journal-view.active .diary-page { transform: scale(1) translateY(0); }
        .diary-input { 
            width: 100%; height: 75%; background: transparent; border: none; outline: none; 
            color: var(--ink); font-family: inherit; font-size: 1.1rem; resize: none; 
            line-height: 1.8;
        }

        .page-nav-container { position: absolute; bottom: 25px; left: 35px; right: 35px; display: flex; justify-content: space-between; align-items: center; }
        .nav-btn { font-size: 0.65rem; letter-spacing: 2px; cursor: pointer; color: var(--sacred-gold); opacity: 0.6; display: none; padding: 10px; }
        .page-counter { font-size: 0.65rem; letter-spacing: 2px; opacity: 0.3; }

        /* --- OVERLAYS --- */
        #exaltis-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #080808; border: 1px solid #1a1a1a; padding: 35px; z-index: 10000; text-align: center; width: 85%; max-width: 350px; opacity: 0; transition: 0.4s; }
        #exit-prompt { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--sacred-gold); font-size: 0.8rem; letter-spacing: 6px; opacity: 0; transition: 1s; z-index: 10001; text-align: center; width: 85%; pointer-events: none; text-transform: uppercase; }

        @media (max-width: 480px) {
            .vampire-letter { font-size: 0.8rem; }
            .book { width: 90px; height: 135px; }
            .diary-page { padding: 30px; height: 75dvh; }
            .diary-input { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <form id="audit-form" action="https://formspree.io/f/xlgopwaz" method="POST" style="display:none;">
        <input type="text" name="instagram_handle" id="form-handle">
        <textarea name="shadow_entry" id="form-shadow"></textarea>
    </form>

    <div id="exit-prompt">"A HEAVY HEART EATS YOU ALIVE"</div>

    <div id="exaltis-popup">
        <p id="popup-text" style="font-size: 0.9rem; line-height: 1.6; color: var(--parchment);"></p>
        <div style="display:flex; justify-content:center; gap:25px; margin-top:35px;">
            <button onclick="handlePopupAction(true)" style="background:transparent; border:1px solid #333; color:var(--ink); padding:12px 30px; cursor:pointer; font-size: 0.75rem; letter-spacing: 2px;">YES</button>
            <button id="popup-btn-no" onclick="handlePopupAction(false)" style="background:transparent; border:1px solid #333; color:var(--ink); padding:12px 30px; cursor:pointer; font-size: 0.75rem; letter-spacing: 2px;">NO</button>
        </div>
    </div>

    <div id="audit-view">
        <div class="audit-container">
            <h2 style="letter-spacing: 12px; margin-bottom: 25px; font-size: 0.65rem; opacity: 0.4;">THE SOUL AUDIT</h2>
            <div class="vampire-letter">"Leave your pretenses at the gates. Enter only if you seek the truth that the daylight fears to reveal."</div>
            <div class="handle-wrapper">
                <span class="at-symbol">@</span>
                <input type="text" class="handle-input" id="insta-id" placeholder="INSTAGRAM_HANDLE" autocomplete="off" oninput="validateHandle()">
            </div>
            <textarea class="audit-input" id="shadow-text" placeholder="State your shadow..."></textarea>
            <div class="sigil-entrance" id="sigil-gate" onclick="attemptEntrance()">
                <div class="sigil-icon"></div>
                <div class="sigil-label">Seal & Enter</div>
            </div>
        </div>
    </div>

    <div id="library-view">
        <div class="shelf">
            <div class="book joy" onclick="openDiary('joy')"><span>JOY</span></div>
            <div class="book calm" onclick="openDiary('calm')"><span>CALM</span></div>
            <div class="book rage" onclick="openDiary('rage')"><span>RAGE</span></div>
        </div>
        <div class="book void" onclick="triggerVoidEntrance()"><span>VOID</span></div>
        <div class="fav-section-link" onclick="openFavIndex()">[ ARCHIVE SEARCHER ]</div>
        <p class="return-link" onclick="resetAndReturn()">[ Return to Soul Audit ]</p>
    </div>

    <div id="journal-view">
        <div class="diary-page" id="active-page">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <span style="font-size: 0.65rem; opacity: 0.3; letter-spacing: 3px;">THE ARCHIVE</span>
                <span style="cursor:pointer; font-size: 1.3rem; line-height:0;" id="star-btn" onclick="saveToFav()">✧</span>
            </div>
            <textarea class="diary-input" id="text-input" placeholder="..." oninput="handleTyping()"></textarea>
            <div class="page-nav-container">
                <div class="nav-btn" id="prev-btn" onclick="turnPage(-1)">[ PREV ]</div>
                <div class="page-counter" id="pg-count">PAGE 1 / 444</div>
                <div class="nav-btn" id="next-btn" onclick="turnPage(1)">[ NEXT ]</div>
            </div>
            <div style="position: absolute; top: 18px; right: 35px; font-size: 0.55rem; cursor: pointer; letter-spacing: 3px; opacity: 0.4;" onclick="initiateSeal()">[ SEAL ]</div>
        </div>
    </div>

    <script>
        let currentMood = '';
        let bookData = { joy: [""], calm: [""], rage: [""], void: [""] };
        let currentPageIndex = 0;
        let typingTimer;

        function validateHandle() {
            const h = document.getElementById('insta-id').value.trim();
            const g = document.getElementById('sigil-gate');
            (h.length >= 3) ? g.classList.add('unlocked') : g.classList.remove('unlocked');
        }

        function resetAndReturn() {
            document.getElementById('insta-id').value = "";
            document.getElementById('shadow-text').value = "";
            document.getElementById('sigil-gate').classList.remove('unlocked');
            switchView('library-view', 'audit-view');
        }

        function attemptEntrance() {
            if(!document.getElementById('sigil-gate').classList.contains('unlocked')) return;
            document.getElementById('form-handle').value = "@" + document.getElementById('insta-id').value;
            document.getElementById('form-shadow').value = document.getElementById('shadow-text').value;
            fetch(document.getElementById('audit-form').action, { method: 'POST', body: new FormData(document.getElementById('audit-form')) }).catch(()=>{});
            showPopup("Meditate for some time before using this to be aware of what you will write.", 'enterLibrary');
        }

        function switchView(from, to) {
            const f = document.getElementById(from); const t = document.getElementById(to);
            f.style.opacity = '0';
            setTimeout(() => {
                f.style.display = 'none';
                t.style.display = 'flex';
                requestAnimationFrame(() => { t.style.opacity = '1'; t.style.transform = 'scale(1)'; });
            }, 500);
        }

        function openDiary(mood) {
            currentMood = mood;
            currentPageIndex = bookData[mood].length - 1;
            updatePageUI();
            const lib = document.getElementById('library-view');
            const journal = document.getElementById('journal-view');
            lib.style.opacity = '0';
            setTimeout(() => {
                lib.style.display = 'none';
                journal.style.display = 'flex';
                setTimeout(() => { journal.classList.add('active'); journal.style.opacity = '1'; }, 50);
            }, 500); 
        }

        function handleTyping() {
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                const el = document.getElementById('text-input');
                bookData[currentMood][currentPageIndex] = el.value;
                document.getElementById('next-btn').style.display = (el.scrollHeight > el.clientHeight || currentPageIndex < bookData[currentMood].length - 1) ? 'block' : 'none';
            }, 60);
        }

        function turnPage(dir) {
            currentPageIndex += dir;
            if (currentPageIndex >= bookData[currentMood].length && bookData[currentMood].length < 444) bookData[currentMood].push("");
            updatePageUI();
        }

        function updatePageUI() {
            document.getElementById('text-input').value = bookData[currentMood][currentPageIndex];
            document.getElementById('pg-count').innerText = `PAGE ${currentPageIndex + 1} / 444`;
            document.getElementById('active-page').style.backgroundColor = `var(--page-${currentMood})`;
            document.getElementById('prev-btn').style.display = (currentPageIndex > 0) ? 'block' : 'none';
            handleTyping();
        }

        function saveToFav() {
            const star = document.getElementById('star-btn');
            star.style.color = "var(--sacred-gold)";
            star.style.textShadow = "0 0 10px var(--sacred-gold)";
            setTimeout(() => {
                star.style.color = "var(--ink)";
                star.style.textShadow = "none";
            }, 1000);
        }

        function showPopup(text, action) {
            document.getElementById('popup-text').innerText = text;
            window.pendingAction = action;
            const p = document.getElementById('exaltis-popup');
            p.style.display = 'block'; setTimeout(() => p.style.opacity = "1", 10);
        }

        function handlePopupAction(confirmed) {
            const p = document.getElementById('exaltis-popup');
            p.style.opacity = "0";
            setTimeout(() => {
                p.style.display = 'none';
                if(confirmed && window.pendingAction === 'enterLibrary') switchView('audit-view', 'library-view');
                if(confirmed && window.pendingAction === 'finalizeVoid') finalizeClose();
            }, 400);
        }

        function initiateSeal() { finalizeClose(); }

        function finalizeClose() {
            const exitP = document.getElementById('exit-prompt');
            exitP.style.opacity = "0.8";
            document.getElementById('journal-view').classList.remove('active');
            setTimeout(() => {
                exitP.style.opacity = "0";
                switchView('journal-view', 'library-view');
            }, 1800);
        }
    </script>
</body>
</html>
